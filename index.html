<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portals - DeFi Landing Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
</head>
<body class="bg-black min-h-screen relative">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 px-6 py-4 flex justify-between items-center glass border-b-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 flex items-center justify-center">
                <div class="w-3 h-3 bg-white rounded-full"></div>
            </div>
            <span class="font-bold text-xl tracking-tight">Portals</span>
        </div>
        
        <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-white transition-colors">Home</a>
            <a href="#" class="hover:text-white transition-colors">Products</a>
            <a href="#" class="hover:text-white transition-colors">Developers</a>
            <a href="#" class="hover:text-white transition-colors">Contact</a>
        </div>

        <button class="btn-primary px-5 py-2 rounded-full text-sm font-semibold text-white">
            Book a demo
        </button>
    </nav>

    <!-- Main Content -->
    <main class="relative w-full min-h-screen flex items-center pt-20 overflow-hidden">
        
        <!-- Background Grid/Track -->
        <div class="absolute inset-0 z-0 opacity-30 pointer-events-none">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150vw] h-[150vw] border border-gray-800 rounded-full"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120vw] h-[120vw] border border-gray-800 rounded-full"></div>
            <!-- Radial lines simulating the track -->
            <div class="absolute top-0 left-1/2 w-px h-full bg-gradient-to-b from-transparent via-gray-800 to-transparent"></div>
            <div class="absolute top-0 left-1/3 w-px h-full bg-gradient-to-b from-transparent via-gray-800 to-transparent rotate-12"></div>
            <div class="absolute top-0 right-1/3 w-px h-full bg-gradient-to-b from-transparent via-gray-800 to-transparent -rotate-12"></div>
        </div>

        <!-- Three.js Canvas Container -->
        <div id="canvas-container" class="absolute inset-0 z-0"></div>

        <!-- Hero Text -->
        <div class="relative z-10 container mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div class="space-y-6 max-w-2xl">
                <h1 class="text-5xl md:text-7xl font-bold leading-tight">
                    Simplifying DeFi's <br>
                    <span class="text-gradient">Most Complex Transactions</span>
                </h1>
                <p class="text-gray-400 text-lg md:text-xl max-w-lg leading-relaxed">
                    Powering seamless Zaps and Historical Data APIs, and AI Intel to make DeFi simpler and enable builders to ship faster.
                </p>
                
                <div class="flex items-center gap-4 pt-4">
                    <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-gray-200 transition-colors flex items-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        Watch Demo
                    </button>
                    <button class="px-8 py-3 rounded-full font-semibold border border-gray-700 hover:bg-white/5 transition-colors">
                        Documentation
                    </button>
                </div>
            </div>

            <!-- Visual Spacer for 3D Scene -->
            <div class="hidden lg:block h-[600px] relative">
                <!-- The 3D scene renders here, text floats over it via z-index -->
            </div>
        </div>

        <!-- Portal Glows (CSS Implementation for fallback/visuals) -->
        <div class="absolute top-1/2 right-1/4 -translate-y-1/2 w-64 h-64 bg-purple-600 rounded-full blur-[100px] opacity-40 pointer-events-none mix-blend-screen"></div>
        <div class="absolute bottom-1/4 right-1/3 w-48 h-48 bg-blue-600 rounded-full blur-[80px] opacity-30 pointer-events-none mix-blend-screen"></div>

    </main>

    <!-- Interactive Elements Overlay -->
    <div class="fixed bottom-10 left-10 z-40 hidden md:block">
        <div class="glass p-4 rounded-2xl flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center cursor-pointer hover:bg-white/20 transition">
                <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
            <div class="w-48 h-1 bg-gray-700 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-purple-500 to-pink-500 w-2/3"></div>
            </div>
        </div>
    </div>

  </body>
</html>
